  <div id="root"></div>
  <script type="text/babel">
    window.onerror = function(msg, url, lineNo, columnNo, error) {
      console.error('GLOBAL ERROR:', msg, error);
      const root = document.getElementById('root');
      if (root && root.innerHTML === '') {
        root.innerHTML = `<div style="padding: 20px; color: #E74C3C; font-family: sans-serif;">
          <h3>Critical Application Error</h3>
          <p>${msg}</p>
          <small>Check the console for details.</small>
        </div>`;
      }
      return false;
    };

    // Destructure from UMD globals — no import statements allowed in Babel standalone
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // ---------------------------------------------------------------------------
    // useDraggable Hook
    // ---------------------------------------------------------------------------
    function useDraggable(initialX, initialY) {
      const [pos, setPos] = useState({ x: initialX, y: initialY });
      const [dragging, setDragging] = useState(false);
      const dragRef = useRef({ offsetX: 0, offsetY: 0 });

      const onMouseDown = useCallback((e) => {
        // Only drag if left click and not on a button/input
        if (e.button !== 0) return;
        if (['BUTTON', 'INPUT', 'SELECT', 'A'].includes(e.target.tagName)) return;
        
        setDragging(true);
        const rect = e.currentTarget.getBoundingClientRect();
        dragRef.current = {
          offsetX: e.clientX - rect.left,
          offsetY: e.clientY - rect.top,
        };
        e.stopPropagation();
      }, []);

      useEffect(() => {
        if (!dragging) return;

        const onMouseMove = (e) => {
          setPos({
            x: e.clientX - dragRef.current.offsetX,
            y: e.clientY - dragRef.current.offsetY,
          });
        };

        const onMouseUp = () => {
          setDragging(false);
        };

        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mouseup', onMouseUp);
        return () => {
          window.removeEventListener('mousemove', onMouseMove);
          window.removeEventListener('mouseup', onMouseUp);
        };
      }, [dragging]);

      return { pos, onMouseDown, dragging };
    }

    // ---------------------------------------------------------------------------
    // Design tokens
    // ---------------------------------------------------------------------------
    const T = {

    // ---------------------------------------------------------------------------
    // hexToRgba
    // ---------------------------------------------------------------------------
    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    // ---------------------------------------------------------------------------
    // AnatomySchematic
    // ---------------------------------------------------------------------------
    function AnatomySchematic({ topAngle, sideAngle }) {
      const canvasRef = useRef(null);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const W = 180, H = 80;
        canvas.width = W; canvas.height = H;

        ctx.clearRect(0, 0, W, H);
        ctx.font = '9px "DM Mono", monospace';
        ctx.textAlign = 'center';

        // --- 1. Top View (XZ) ---
        const cx1 = 45, cy1 = 40, r = 25;
        // Brain outline (simplified)
        ctx.strokeStyle = '#DDD8CE'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.ellipse(cx1, cy1, r*0.8, r, 0, 0, Math.PI*2); ctx.stroke();
        ctx.fillStyle = '#AAA098'; ctx.fillText('TOP VIEW', cx1, cy1 - r - 5);
        
        // Coronal line (horizontal)
        ctx.setLineDash([2, 2]);
        ctx.beginPath(); ctx.moveTo(cx1 - r, cy1); ctx.lineTo(cx1 + r, cy1); ctx.stroke();
        ctx.setLineDash([]);

        // Oblique line
        const topRad = (topAngle * Math.PI) / 180;
        const lx = Math.cos(topRad) * r, ly = -Math.sin(topRad) * r;
        ctx.strokeStyle = '#4A90D9'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(cx1 - lx, cy1 - ly); ctx.lineTo(cx1 + lx, cy1 + ly); ctx.stroke();
        ctx.fillStyle = '#4A90D9'; ctx.fillText(`${topAngle}\u00b0`, cx1 + lx*1.2, cy1 + ly*1.2 + 4);

        // --- 2. Side View (YZ) ---
        const cx2 = 135, cy2 = 40;
        // Brain outline (simplified)
        ctx.strokeStyle = '#DDD8CE'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.ellipse(cx2, cy2, r, r*0.7, 0, 0, Math.PI*2); ctx.stroke();
        ctx.fillStyle = '#AAA098'; ctx.fillText('SIDE VIEW', cx2, cy2 - r - 5);

        // Coronal line (vertical)
        ctx.setLineDash([2, 2]);
        ctx.beginPath(); ctx.moveTo(cx2, cy2 - r); ctx.lineTo(cx2, cy2 + r); ctx.stroke();
        ctx.setLineDash([]);

        // Oblique line
        const sideRad = (sideAngle * Math.PI) / 180;
        const sx = Math.sin(sideRad) * r, sy = -Math.cos(sideRad) * r;
        ctx.strokeStyle = '#4A90D9'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(cx2 - sx, cy2 - sy); ctx.lineTo(cx2 + sx, cy2 + sy); ctx.stroke();
        ctx.fillStyle = '#4A90D9'; ctx.fillText(`${sideAngle}\u00b0`, cx2 + sx*1.2, cy2 + sy*1.2 + 4);

      }, [topAngle, sideAngle]);

      return <canvas ref={canvasRef} style={{ width: 180, height: 80, display: 'block', margin: '0 auto' }} />;
    }

    // ---------------------------------------------------------------------------
    // DistanceMeter
    // ---------------------------------------------------------------------------
    function DistanceMeter({ apPosition, atlasVersion }) {
      const scale = atlasVersion === 'p4' ? 0.57 : 1.0;
      const centerOffset = 6500 * scale;
      const totalAP = centerOffset * 2;
      
      const distR = (apPosition + centerOffset) / 1000;
      const distC = (centerOffset - apPosition) / 1000;
      const pct = ((apPosition + centerOffset) / totalAP) * 100;

      return (
        <div style={{ padding: '0 10px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
            <div style={{ textAlign: 'left' }}>
              <div style={{ fontFamily: '"DM Mono", monospace', fontSize: 8, color: '#AAA098' }}>ROSTRAL</div>
              <div style={{ fontFamily: '"DM Mono", monospace', fontSize: 11, fontWeight: 600, color: '#5A5450' }}>{distR.toFixed(2)}mm</div>
            </div>
            <div style={{ textAlign: 'right' }}>
              <div style={{ fontFamily: '"DM Mono", monospace', fontSize: 8, color: '#AAA098' }}>CAUDAL</div>
              <div style={{ fontFamily: '"DM Mono", monospace', fontSize: 11, fontWeight: 600, color: '#5A5450' }}>{distC.toFixed(2)}mm</div>
            </div>
          </div>
          
          <div style={{ height: 4, background: '#DDD8CE', borderRadius: 2, position: 'relative', marginBottom: 4 }}>
            {/* Range markers */}
            <div style={{ position: 'absolute', left: 0, top: -2, width: 1, height: 8, background: '#AAA098' }} />
            <div style={{ position: 'absolute', right: 0, top: -2, width: 1, height: 8, background: '#AAA098' }} />
            
            {/* Slice position indicator */}
            <div style={{ 
              position: 'absolute', left: `${pct}%`, top: -4, 
              width: 2, height: 12, background: '#4A90D9',
              boxShadow: '0 0 4px rgba(74,144,217,0.4)',
              transition: 'left 0.2s ease-out'
            }} />
          </div>
          <div style={{ textAlign: 'center', fontFamily: '"DM Mono", monospace', fontSize: 8, color: '#AAA098' }}>
            TOTAL DEPTH: {(totalAP / 1000).toFixed(1)}mm
          </div>
        </div>
      );
    }

    // ---------------------------------------------------------------------------
    // SliderPill
    // ---------------------------------------------------------------------------
    function SliderPill({ value, unit }) {
      const display = (value >= 0 ? '+' : '') + value + unit;
      return (
        <div style={{
          position: 'absolute', right: 0, top: -18,
          fontFamily: '"DM Mono", monospace', fontSize: 10,

          pointerEvents: 'none', whiteSpace: 'nowrap',

          {display}

      );
    }

    // ---------------------------------------------------------------------------
    // renderMiniSlice
    // ---------------------------------------------------------------------------
    function renderMiniSlice(entry, w = 60, h = 45) {
      const THREE = window.THREE;
      if (!THREE || !entry.sliceResult || !entry.sliceResult.intersections || !entry.sliceResult.intersections.length) return null;

      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');

      ctx.fillStyle = '#FAF8F5';
      ctx.fillRect(0, 0, w, h);

      const sr = entry.sliceResult;
      const normal = sr.plane.normal;
      const up = Math.abs(normal.y) < 0.99 ? new THREE.Vector3(0, 1, 0) : new THREE.Vector3(1, 0, 0);
      const uAxis = new THREE.Vector3().crossVectors(up, normal).normalize();
      const vAxis = new THREE.Vector3().crossVectors(normal, uAxis).normalize();

      let uMin = Infinity, uMax = -Infinity, vMin = Infinity, vMax = -Infinity;
      sr.intersections.forEach(ix => {
        ix.segments.forEach(seg => {
          ['start', 'end'].forEach(k => {
            const u =  seg[k].dot(uAxis);
            const v = -seg[k].dot(vAxis);
            if (u < uMin) uMin = u; if (u > uMax) uMax = u;
            if (v < vMin) vMin = v; if (v > vMax) vMax = v;
          });
        });
      });

      const rangeU = uMax - uMin || 1;
      const rangeV = vMax - vMin || 1;
      // Auto-fit scale — same formula as full renderSlice2D (carry-forward constraint)
      const scale = Math.min((w * 0.85) / rangeU, (h * 0.85) / rangeV);
      const cx = w / 2 - ((uMin + uMax) / 2) * scale;
      const cy = h / 2 + ((vMin + vMax) / 2) * scale;

      sr.intersections.forEach(ix => {
        ctx.strokeStyle = ix.color;
        ctx.lineWidth = 1;
        ix.segments.forEach(seg => {
          ctx.beginPath();
          ctx.moveTo( seg.start.dot(uAxis) * scale + cx, -seg.start.dot(vAxis) * scale + cy);
          ctx.lineTo( seg.end.dot(uAxis)   * scale + cx, -seg.end.dot(vAxis)   * scale + cy);
          ctx.stroke();
        });
      });

      return canvas.toDataURL('image/png');
    }

    // P4 Approximation (scaled down ~57% to match 7.5mm AP goal)
    const P4_STRUCTURES_RAW = ADULT_STRUCTURES_RAW.map(s => {
      const scale = 0.57; // Adjusted from 0.62 to meet 7.5mm AP goal
      return {
        ...s,
        center_ccf: s.center_ccf.map(v => Math.round(v * scale)),
        semi_axes:  s.semi_axes.map(v => Math.round(v * scale)),
      };
    });

    const ROOT_MESH_ID = 997;

    // Registry helper
    function getRegistry(version = 'p4') {
      const raw = version === 'p4' ? P4_STRUCTURES_RAW : ADULT_STRUCTURES_RAW;
      const frozen = Object.freeze(raw.map(s => Object.freeze({ ...s })));
      const byAcronym = Object.freeze(Object.fromEntries(frozen.map(s => [s.acronym, s])));
      const byGroup = Object.freeze(frozen.reduce((acc, s) => {
        if (!acc[s.group]) acc[s.group] = [];
        acc[s.group].push(s.acronym);
        return acc;
      }, {}));
      return { structures: frozen, byAcronym, byGroup };
    }

    // Default to P4
    let CURRENT_REGISTRY = getRegistry('p4');
    let CCF_STRUCTURES   = CURRENT_REGISTRY.structures;
    let CCF_BY_ACRONYM   = CURRENT_REGISTRY.byAcronym;
    let CCF_BY_GROUP     = CURRENT_REGISTRY.byGroup;

    function switchAtlasVersion(version) {
      CURRENT_REGISTRY = getRegistry(version);
      CCF_STRUCTURES   = CURRENT_REGISTRY.structures;
      CCF_BY_ACRONYM   = CURRENT_REGISTRY.byAcronym;
      CCF_BY_GROUP     = CURRENT_REGISTRY.byGroup;
    }

    const GROUP_COLORS = Object.freeze({
      thalamus:    '#FF6B6B',
      cortex:      '#2ECC71',
      fiber:       '#BDC3C7',
      hippocampus: '#8E44AD',
      subcortical: '#F39C12',
    });

    // ---------------------------------------------------------------------------
    // Coordinate Utilities
    // ---------------------------------------------------------------------------
    function ccfToThree(ccfX, ccfY, ccfZ, scale = 1.0) {
      if (!isFinite(ccfX) || !isFinite(ccfY) || !isFinite(ccfZ)) {
        throw new Error(`ccfToThree: non-finite input (${ccfX}, ${ccfY}, ${ccfZ})`);
      }
      return {
        x:  ccfZ - 5700 * scale,
        y: -(ccfY - 4000 * scale),
        z: -(ccfX - 5700 * scale),
      };
    }

    function ccfRawToThree(ccfX, ccfY, ccfZ, atlasVersion) {
      if (!isFinite(ccfX) || !isFinite(ccfY) || !isFinite(ccfZ)) {
        throw new Error(`ccfRawToThree: non-finite input (${ccfX}, ${ccfY}, ${ccfZ})`);
      }
      const scale = atlasVersion === 'p4' ? 0.57 : 1.0;
      return {
        x: (ccfZ - 5700) * scale,
        y: -(ccfY - 4000) * scale,
        z: -(ccfX - 5700) * scale,
      };
    }

    // ---------------------------------------------------------------------------
    // buildSlicePlane v3 — Stage 6 axis remapping preserved
    // Stage 6 FIX 1: roll→Euler X (somersault), yaw→Euler Y, pitch→Euler Z (axial spin)
    // All axes raw µm — no /1000 (carry-forward invariant)
    // ---------------------------------------------------------------------------
    function buildSlicePlane(pitch, yaw, roll, apMicrons, lrMicrons = 0, dvMicrons = 0) {
      const THREE = window.THREE;
      const euler = new THREE.Euler(
        THREE.MathUtils.degToRad(roll),
        THREE.MathUtils.degToRad(yaw),
        THREE.MathUtils.degToRad(pitch),
        'XYZ'
      );
      const normal = new THREE.Vector3(0, 0, 1);
      const rotMat = new THREE.Matrix4().makeRotationFromEuler(euler);
      normal.applyMatrix4(rotMat).normalize();

      // Translation: all axes in raw µm (1 µm = 1 Three.js unit). No /1000.
      const center = new THREE.Vector3(
        lrMicrons,
        -dvMicrons,
        -apMicrons
      );
      return new THREE.Plane().setFromNormalAndCoplanarPoint(normal, center);
    }

    // ---------------------------------------------------------------------------
    // intersectMeshWithPlane — edgeIntersect: >= 0 positive-side convention (carry-forward)
    // ---------------------------------------------------------------------------
    function intersectMeshWithPlane(mesh, plane) {
      const THREE = window.THREE;
      const geo      = mesh.geometry;
      const posAttr  = geo.attributes.position;
      const index    = geo.index;
      const segments = [];

      const vertexCount = index ? index.count : posAttr.count;
      const triCount    = Math.floor(vertexCount / 3);

      function edgeIntersect(v1, v2, d1, d2, pts) {
        if (d1 === 0 && d2 === 0) return;
        // >= 0 positive-side convention — carry-forward from Stage 2 (DEBUG_REPORT_2 M-01)
        const s1 = d1 >= 0 ? 1 : -1;
        const s2 = d2 >= 0 ? 1 : -1;
        if (s1 === s2) return;
        const t = d1 / (d1 - d2);
        pts.push(new THREE.Vector3().lerpVectors(v1, v2, t));
      }

      for (let i = 0; i < triCount; i++) {
        const ia = index ? index.getX(i * 3)     : i * 3;
        const ib = index ? index.getX(i * 3 + 1) : i * 3 + 1;
        const ic = index ? index.getX(i * 3 + 2) : i * 3 + 2;

        const vA = new THREE.Vector3()
          .fromBufferAttribute(posAttr, ia)
          .applyMatrix4(mesh.matrixWorld);
        const vB = new THREE.Vector3()
          .fromBufferAttribute(posAttr, ib)
          .applyMatrix4(mesh.matrixWorld);
        const vC = new THREE.Vector3()
          .fromBufferAttribute(posAttr, ic)
          .applyMatrix4(mesh.matrixWorld);

        const dA = plane.distanceToPoint(vA);
        const dB = plane.distanceToPoint(vB);
        const dC = plane.distanceToPoint(vC);

        const pts = [];
        edgeIntersect(vA, vB, dA, dB, pts);
        edgeIntersect(vB, vC, dB, dC, pts);
        edgeIntersect(vC, vA, dC, dA, pts);

        if (pts.length === 2) {
          segments.push({ start: pts[0], end: pts[1] });
        }
      }

      return segments;
    }

    const GROUP_SORT_ORDER = ['thalamus', 'cortex', 'fiber', 'hippocampus', 'subcortical'];

    function computeAllIntersections(meshes, plane) {
      const THREE = window.THREE;
      const results = [];

      meshes.forEach(mesh => {
        if (!mesh.visible) return;
        if (!mesh.userData || !mesh.userData.acronym) return;

        const segments = intersectMeshWithPlane(mesh, plane);
        if (segments.length === 0) return;

        const centroid = new THREE.Vector3();
        segments.forEach(seg => {
          centroid.x += (seg.start.x + seg.end.x) / 2;
          centroid.y += (seg.start.y + seg.end.y) / 2;
          centroid.z += (seg.start.z + seg.end.z) / 2;
        });
        centroid.divideScalar(segments.length);

        results.push({
          acronym:  mesh.userData.acronym,
          name:     mesh.userData.label  || mesh.userData.acronym,
          color:    mesh.userData.color  || '#888888',
          group:    mesh.userData.group  || 'subcortical',
          segments,
          centroid,
        });
      });

      results.sort((a, b) => {
        const ai = GROUP_SORT_ORDER.indexOf(a.group);
        const bi = GROUP_SORT_ORDER.indexOf(b.group);
        return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
      });

      return results;
    }

    // ---------------------------------------------------------------------------
    // Preset Engine
    // Stage 6 FIX 1: TC preset roll:-35 (Euler X somersault)
    // ---------------------------------------------------------------------------
    const PRESETS = Object.freeze({
      tc: Object.freeze({
        pitch: 0, yaw: 0, roll: -35, apPosition: 0,
        highlighted: ['VPM','VPL','LP','ic','SSp','SSp-bfd','MOp'],
      }),
      hippo: Object.freeze({
        pitch: 0, yaw: 15, roll: 0, apPosition: 0,
        highlighted: ['CA1','CA3','DG'],
      }),
    });

    function applyPreset(presetName, currentThickness, setSliceState, setHighlightState) {
      if (!Object.prototype.hasOwnProperty.call(PRESETS, presetName)) {
        throw new Error(`applyPreset: unrecognized presetName "${presetName}"`);
      }
      const p = PRESETS[presetName];
      setSliceState(prev => ({
        ...prev,
        pitch:      p.pitch,
        yaw:        p.yaw,
        roll:       p.roll,
        apPosition: p.apPosition,
      }));
      setHighlightState({ preset: presetName, highlighted: p.highlighted });
    }

    function toggleGroup(groupName, visible, meshMapRef, setVisibility) {
      if (!Object.prototype.hasOwnProperty.call(CCF_BY_GROUP, groupName)) {
        throw new Error(`toggleGroup: unrecognized groupName "${groupName}"`);
      }
      const members = CCF_BY_GROUP[groupName];
      members.forEach(acronym => {
        const mesh = meshMapRef.current[acronym];
        if (!mesh) { console.warn(`toggleGroup: acronym "${acronym}" not found in mesh map`); return; }
        mesh.visible = visible;
      });
      setVisibility(prev => {
        const next = { ...prev };
        members.forEach(a => { next[a] = visible; });
        return next;
      });
    }

    function makeInitialVisibility() {
      return Object.fromEntries(CCF_STRUCTURES.map(s => [s.acronym, true]));
    }

    function makeInitialGroupVisibility() {
      return Object.fromEntries(Object.keys(CCF_BY_GROUP).map(g => [g, true]));
    }

    // ---------------------------------------------------------------------------
    // Thickness stack constants
    // ---------------------------------------------------------------------------
    const THICKNESS_STACK_COUNT = Object.freeze({
      '350µm': 1, '400µm': 1, '1mm': 3, '2mm': 5, '4mm': 8, '6mm': 12,
    });

    const THICKNESS_TO_MICRONS = Object.freeze({
      '350µm': 350, '400µm': 400, '1mm': 1000, '2mm': 2000, '4mm': 4000, '6mm': 6000,
    });

    const EXPRESSION_OVERLAY_META = Object.freeze({
      Slc17a6: Object.freeze({
        label: 'VGluT2',
        color: '#F28C28',
        circuit: 'Thalamocortical relay / diencephalon',
        note: 'Best interpreted as a broad relay-glutamatergic gradient, not a cortex-only map.',
      }),
      Slc6a4: Object.freeze({
        label: 'SERT',
        color: '#D74E6A',
        circuit: 'Transient thalamocortical axon marker',
        note: 'Use cautiously: this is exploratory expression data, not validated protein-only signal.',
      }),
      Tbr1: Object.freeze({
        label: 'TBR1',
        color: '#4A6FD1',
        circuit: 'Layer VI corticothalamic neurons',
        note: 'Should read as a deep-cortical / corticothalamic gradient rather than a thalamic relay marker.',
      }),
    });

    function getVisibleIntersections(sliceLike, visibilityState) {
      if (!sliceLike?.intersections) return [];
      return sliceLike.intersections.filter(ix => visibilityState?.[ix.acronym] !== false);
    }

    function getSliceThicknessMicrons(sliceLike) {
      return THICKNESS_TO_MICRONS[sliceLike?.thickness] ?? 400;
    }

    function formatSignedValue(value, unit = '') {
      if (!Number.isFinite(value)) return `0${unit}`;
      const rounded = Math.round(value);
      return `${rounded >= 0 ? '+' : ''}${rounded}${unit}`;
    }

    function formatExpressionValue(value) {
      if (!Number.isFinite(value)) return '0.00';
      return value.toFixed(2);
    }

    function formatCount(value) {
      if (!Number.isFinite(value)) return '0';
      return new Intl.NumberFormat('en-US').format(Math.round(value));
    }

    function percentile(sortedValues, q) {
      if (!Array.isArray(sortedValues) || sortedValues.length === 0) return 0;
      const clamped = Math.max(0, Math.min(1, q));
      const index = (sortedValues.length - 1) * clamped;
      const lower = Math.floor(index);
      const upper = Math.ceil(index);
      if (lower === upper) return sortedValues[lower];
      const weight = index - lower;
      return sortedValues[lower] * (1 - weight) + sortedValues[upper] * weight;
    }

    function getExpressionSourceLabel(source) {
      if (source === 'expression') return 'server data';
      if (source === 'expression_data.json') return 'local data';
      return source || 'unavailable';
    }

    const EXPRESSION_SAMPLE_SPACING_MICRONS = 200;
    const EXPRESSION_MIN_VISIBLE_NORMALIZED = 0.04;
    const EXPRESSION_PLANE_OFFSET_MICRONS = 18;

    function getPanelWidthBounds(innerWidth = window.innerWidth) {
      if (innerWidth >= 2200) return { min: 22, max: 90, initial: 70 };
      if (innerWidth >= 1700) return { min: 24, max: 88, initial: 68 };
      if (innerWidth >= 1400) return { min: 26, max: 86, initial: 64 };
      return { min: 30, max: 80, initial: 60 };
    }

    function isPointInsideFallbackBrain(pointWorld, atlasVersion) {
      const shellScale = atlasVersion === 'p4' ? 0.57 : 1.0;
      const nx = pointWorld.x / (5700 * shellScale);
      const ny = pointWorld.y / (4000 * shellScale);
      const nz = pointWorld.z / (6500 * shellScale);
      return (nx * nx + ny * ny + nz * nz) <= 1.02;
    }

    function isPointInsideBrain(pointWorld, atlasVersion) {
      // Keep the mask cheap enough for interactive toggling.
      // The developmental expression points are already atlas-sampled; once the
      // raw-CCF transform is correct, an atlas-shell envelope is a good tradeoff
      // between plausibility and responsiveness.
      return isPointInsideFallbackBrain(pointWorld, atlasVersion);
    }

    function getPlaneAxes(plane) {
      const THREE = window.THREE;
      if (!THREE || !plane?.normal) return null;
      const normal = plane.normal.clone().normalize();
      const up = Math.abs(normal.y) < 0.99 ? new THREE.Vector3(0, 1, 0) : new THREE.Vector3(1, 0, 0);
      const uAxis = new THREE.Vector3().crossVectors(up, normal).normalize();
      const vAxis = new THREE.Vector3().crossVectors(normal, uAxis).normalize();
      return { normal, uAxis, vAxis };
    }

    function getExpressionSliceInclusionWindowMicrons(sliceLike) {
      const thicknessMicrons = getSliceThicknessMicrons(sliceLike);
      return thicknessMicrons / 2 + EXPRESSION_SAMPLE_SPACING_MICRONS / 2;
    }

    function getExpressionVisibilityStrength(normalized) {
      if (!Number.isFinite(normalized)) return 0;
      const trimmed = Math.max(0, (normalized - EXPRESSION_MIN_VISIBLE_NORMALIZED) / (1 - EXPRESSION_MIN_VISIBLE_NORMALIZED));
      return Math.pow(trimmed, 1.12);
    }

    function getSliceProjection(sliceLike, visibilityState, orbit, width, height) {
      const THREE = window.THREE;
      if (!THREE || !sliceLike?.plane) return null;
      const intersections = getVisibleIntersections(sliceLike, visibilityState);
      const normal = sliceLike.plane.normal;
      const up = Math.abs(normal.y) < 0.99 ? new THREE.Vector3(0, 1, 0) : new THREE.Vector3(1, 0, 0);
      const uAxis = new THREE.Vector3().crossVectors(up, normal).normalize();
      const vAxis = new THREE.Vector3().crossVectors(normal, uAxis).normalize();

      let uMin = Infinity, uMax = -Infinity, vMin = Infinity, vMax = -Infinity;
      intersections.forEach(intersection => {
        intersection.segments.forEach(seg => {
          ['start', 'end'].forEach(key => {
            const u = seg[key].dot(uAxis);
            const v = -seg[key].dot(vAxis);
            if (u < uMin) uMin = u;
            if (u > uMax) uMax = u;
            if (v < vMin) vMin = v;
            if (v > vMax) vMax = v;
          });
        });
      });

      if (!isFinite(uMin)) {
        return {
          intersections,
          uAxis,
          vAxis,
          uMin: -1,
          uMax: 1,
          vMin: -1,
          vMax: 1,
          baseScale: 1,
          SCALE: orbit.zoom || 1,
          uCenter: 0,
          vCenter: 0,
          cx: width / 2 + (orbit.panX || 0),
          cy: height / 2 + (orbit.panY || 0),
          W: width,
          H: height,
        };
      }

      const rangeU = uMax - uMin || 1;
      const rangeV = vMax - vMin || 1;
      const baseScale = Math.min((width * 0.8) / rangeU, (height * 0.8) / rangeV);
      const SCALE = baseScale * (orbit.zoom || 1);
      const uCenter = (uMin + uMax) / 2;
      const vCenter = (vMin + vMax) / 2;

      return {
        intersections,
        uAxis,
        vAxis,
        uMin,
        uMax,
        vMin,
        vMax,
        baseScale,
        SCALE,
        uCenter,
        vCenter,
        cx: width / 2 - uCenter * SCALE + (orbit.panX || 0),
        cy: height / 2 - vCenter * SCALE + (orbit.panY || 0),
        W: width,
        H: height,
      };
    }

    function getExpressionSliceSamples(sliceLike, expressionOverlay, atlasVersion, brainMask = null) {
      const THREE = window.THREE;
      if (!THREE || !sliceLike?.plane || !expressionOverlay?.activeGene) return [];
      const points = expressionOverlay.pointsByGene?.[expressionOverlay.activeGene];
      if (!Array.isArray(points) || points.length === 0) return [];

      const range = expressionOverlay.ranges?.[expressionOverlay.activeGene];
      if (!range) return [];

      const axes = getPlaneAxes(sliceLike.plane);
      if (!axes) return [];

      const scale = atlasVersion === 'p4' ? 0.57 : 1.0;
      const planeWindowMicrons = getExpressionSliceInclusionWindowMicrons(sliceLike);
      const planeWindowWorld = planeWindowMicrons * scale;
      const planeOffsetWorld = Math.min(planeWindowWorld * 0.12, EXPRESSION_PLANE_OFFSET_MICRONS * scale);
      const normMin = Number.isFinite(range.p05) ? range.p05 : range.min;
      const normMax = Number.isFinite(range.p95) ? range.p95 : range.max;
      const energySpan = Math.max(1e-6, normMax - normMin);

      return points.reduce((acc, point) => {
        const [ap, dv, ml, energy] = point;
        if (!isFinite(energy)) return acc;

        const pos = ccfRawToThree(ap, dv, ml, atlasVersion);
        const center = new THREE.Vector3(pos.x, pos.y, pos.z);
        if (brainMask && !brainMask(center)) return acc;

        const centerDistance = sliceLike.plane.distanceToPoint(center);
        if (Math.abs(centerDistance) > planeWindowWorld) return acc;

        const normalized = Math.max(0, Math.min(1, (energy - normMin) / energySpan));
        const strength = getExpressionVisibilityStrength(normalized);
        if (strength <= 0) return acc;

        const planePoint = sliceLike.plane
          .projectPoint(center, new THREE.Vector3())
          .addScaledVector(axes.normal, planeOffsetWorld);
        const distanceWeight = 1 - Math.abs(centerDistance) / Math.max(planeWindowWorld, 1e-6);

        acc.push({
          centerWorld: center,
          world: planePoint,
          planePoint,
          normalized,
          strength,
          alpha: Math.min(0.9, (expressionOverlay.opacity ?? 1) * (0.18 + 0.82 * strength) * (0.4 + 0.6 * distanceWeight)),
          radius2D: atlasVersion === 'p4' ? 2.25 : 2.55,
          size3D: atlasVersion === 'p4' ? 7.8 : 8.8,
          energy,
          sourceDistance: Math.abs(centerDistance),
        });

        return acc;
      }, []);
    }

    function getIntersectionPolygonPoints(intersection, projection) {
      if (!intersection?.segments?.length || !projection?.uAxis || !projection?.vAxis) return [];
      const points = [];
      intersection.segments.forEach(seg => {
        ['start', 'end'].forEach(key => {
          points.push({
            x: seg[key].dot(projection.uAxis) * projection.SCALE + projection.cx,
            y: (-seg[key].dot(projection.vAxis)) * projection.SCALE + projection.cy,
          });
        });
      });
      if (!points.length) return [];
      const centerX = intersection.centroid.dot(projection.uAxis) * projection.SCALE + projection.cx;
      const centerY = (-intersection.centroid.dot(projection.vAxis)) * projection.SCALE + projection.cy;
      return points.sort(
        (a, b) => Math.atan2(a.y - centerY, a.x - centerX) - Math.atan2(b.y - centerY, b.x - centerX)
      );
    }

    function traceIntersectionsPath(ctx, intersections, projection) {
      let hasPath = false;
      intersections.forEach(intersection => {
        const polygon = getIntersectionPolygonPoints(intersection, projection);
        if (polygon.length < 3) return;
        ctx.moveTo(polygon[0].x, polygon[0].y);
        polygon.slice(1).forEach(point => ctx.lineTo(point.x, point.y));
        ctx.closePath();
        hasPath = true;
      });
      return hasPath;
    }

    function drawExpressionOverlay2D(ctx, samples, activeGeneMeta, intersections, projection) {
      if (!ctx || !Array.isArray(samples) || !samples.length || !activeGeneMeta || !projection) return;
      const rgb = activeGeneMeta.color
        .replace('#', '')
        .match(/.{2}/g)
        .map(value => parseInt(value, 16));

      ctx.save();
      ctx.beginPath();
      if (!traceIntersectionsPath(ctx, intersections, projection)) {
        ctx.restore();
        return;
      }
      ctx.clip();

      samples.forEach(sample => {
        const x = sample.planePoint.dot(projection.uAxis) * projection.SCALE + projection.cx;
        const y = (-sample.planePoint.dot(projection.vAxis)) * projection.SCALE + projection.cy;
        const haloAlpha = Math.min(0.18, sample.alpha * 0.42);
        const fillAlpha = Math.min(0.52, sample.alpha * 0.92);

        ctx.fillStyle = `rgba(255,255,255,${haloAlpha})`;
        ctx.beginPath();
        ctx.arc(x, y, sample.radius2D + 1.2, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = `rgba(${rgb[0]},${rgb[1]},${rgb[2]},${fillAlpha})`;
        ctx.beginPath();
        ctx.arc(x, y, sample.radius2D, 0, Math.PI * 2);
        ctx.fill();
      });

      ctx.restore();
    }

    // ---------------------------------------------------------------------------
    // ChunkSliceThumb — thumbnail canvas for one slice in the filmstrip
    // ---------------------------------------------------------------------------
    function ChunkSliceThumb({ slice, index, total, isSelected, visibilityState, onClick }) {
      const canvasRef = React.useRef(null);
      React.useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas || !slice || !slice.plane || !slice.intersections) return;
        const THREE = window.THREE;
        if (!THREE) return;
        const W = 90, H = 70;
        canvas.width = W; canvas.height = H;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#FAF8F5'; ctx.fillRect(0, 0, W, H);
        const visibleIntersections = getVisibleIntersections(slice, visibilityState);
        const normal = slice.plane.normal;
        const up = Math.abs(normal.y) < 0.99 ? new THREE.Vector3(0,1,0) : new THREE.Vector3(1,0,0);
        const uAxis = new THREE.Vector3().crossVectors(up, normal).normalize();
        const vAxis = new THREE.Vector3().crossVectors(normal, uAxis).normalize();
        let uMin=Infinity,uMax=-Infinity,vMin=Infinity,vMax=-Infinity;
        visibleIntersections.forEach(ix => ix.segments.forEach(seg => {
          ['start','end'].forEach(k => {
            const u=seg[k].dot(uAxis), v=-seg[k].dot(vAxis);
            if(u<uMin)uMin=u; if(u>uMax)uMax=u; if(v<vMin)vMin=v; if(v>vMax)vMax=v;
          });
        }));
        if (!isFinite(uMin)) {
          ctx.fillStyle = '#B8B0A6';
          ctx.font = 'bold 9px "DM Mono", monospace';
          ctx.textAlign = 'center';
          ctx.fillText('hidden', W / 2, H / 2 + 3);
          ctx.textAlign = 'left';
          return;
        }
        const sc = Math.min(W*0.8/(uMax-uMin+1), H*0.8/(vMax-vMin+1));
        const cx = W/2-((uMin+uMax)/2)*sc, cy = H/2+((vMin+vMax)/2)*sc;
        visibleIntersections.forEach(ix => {
          ctx.strokeStyle=ix.color; ctx.lineWidth=1;
          ix.segments.forEach(s => {
            ctx.beginPath();
            ctx.moveTo(s.start.dot(uAxis)*sc+cx, -s.start.dot(vAxis)*sc+cy);
            ctx.lineTo(s.end.dot(uAxis)*sc+cx,   -s.end.dot(vAxis)*sc+cy);
            ctx.stroke();
          });
        });
      }, [slice, visibilityState]);
      const isCenter = index === Math.floor(total/2);
      const lbl = slice.offset>=0 ? `+${slice.offset}` : `${slice.offset}`;
      return (
        <button
          onClick={onClick}
          style={{
            flexShrink: 0,
            display: 'flex',
            flexDirection: 'column',
            alignItems: 'center',
            border: 'none',
            background: 'transparent',
            padding: 0,
            cursor: 'pointer',
          }}
        >
          <canvas ref={canvasRef} width={90} height={70} style={{
            border: isSelected ? '2px solid #C88B2A' : (isCenter ? '2px solid #4A6741' : '1px solid #DDD8CE'),
            borderRadius: 3, display:'block',
            boxShadow: isSelected ? '0 0 0 2px rgba(200,139,42,0.18)' : 'none',
          }} />
          <div style={{ fontSize:8, color: isSelected ? '#A96E1A' : '#8A8078', fontFamily:'"DM Mono",monospace', marginTop:2 }}>
            {lbl}µm
          </div>
        </button>
      );
    }

    // ---------------------------------------------------------------------------
    // Main Component
    // ---------------------------------------------------------------------------
    function AllenAtlasSlicePlanner() {
      // ---- Shared state -------------------------------------------------------
      const [sliceState, setSliceState] = useState({
        pitch:      0,
        yaw:        0,
        roll:       0,

      });

        preset:      null,
        highlighted: [],
      });

      const [groupVisibility,  setGroupVisibility]  = useState(makeInitialGroupVisibility);

      const [saveNameInput,        setSaveNameInput]        = useState('');
      const [showSaveInput,        setShowSaveInput]        = useState(false);
      const [importMsg,            setImportMsg]            = useState('');
      const [savedSlicesPanelOpen, setSavedSlicesPanelOpen] = useState(true);

      // Chunk mode state
      const [chunkMode,    setChunkMode]    = useState(false);
      const [chunkCount,   setChunkCount]   = useState(7);
      const [chunkSpacing, setChunkSpacing] = useState(300);
      const [chunkResult,  setChunkResult]  = useState(null);
      const [activeChunkIndex, setActiveChunkIndex] = useState(null);
      const chunkPlanesRef = useRef([]);

          const scale = atlasVersion === 'p4' ? 0.57 : 1.0;
          let nanCount = 0;
          for (let i = 0; i < verts.length; i += 3) {
            const cx = verts[i];
            const cy = verts[i + 1];
            const cz = verts[i + 2];
            if (!isFinite(cx) || !isFinite(cy) || !isFinite(cz)) {
              nanCount++;
              verts[i] = 0; verts[i+1] = 0; verts[i+2] = 0;

            verts[i]     = (cz - 5700) * scale;

          meshLoadStateRef.current.loaded++;

          setMeshLoadState({ ...meshLoadStateRef.current });

        function finishLoadedMesh(targetMesh, geometry, acronym) {
          if (!targetMesh) throw new Error(`Target mesh for ${acronym} no longer exists`);
          const positions = geometry?.attributes?.position?.array;
          if (!positions || positions.length === 0) {
            throw new Error(`Empty position buffer for ${acronym}`);

          applyCcfToThree(positions, acronym);
          geometry.computeVertexNormals();
          geometry.computeBoundingSphere();
          targetMesh.geometry = geometry;

            (geometry) => {

                onFailed(targetMesh, acronym);

            undefined,
            () => {

              onFailed(targetMesh, acronym);

        function fetchAndApplyMesh(structureId, acronym, targetMesh) {
          if (meshSource !== 'backend') {
            loadStaticMesh(structureId, acronym, targetMesh);

              if (!Array.isArray(data.vertices) || data.vertices.length === 0)
                throw new Error(`Empty vertices array for ${acronym}`);
              if (!Array.isArray(data.faces) || data.faces.length === 0)
                throw new Error(`Empty faces array for ${acronym}`);
              if (data.vertices.length % 3 !== 0)
                throw new Error(`Malformed vertices for ${acronym}`);
              if (data.faces.length % 3 !== 0)
                throw new Error(`Malformed faces for ${acronym}`);
              const verts = new Float32Array(data.vertices);
              // applyCcfToThree is called inside finishLoadedMesh — do NOT call here

              geo.setAttribute('position', new THREE2.BufferAttribute(verts, 3));
              if (data.faces.length > 0) {

                geo.setIndex(new THREE2.BufferAttribute(indices, 1));
              }
              finishLoadedMesh(targetMesh, geo, acronym);
            })
            .catch(err => {
              clearTimeout(timeoutId);
              console.warn(`Allen mesh unavailable for ${acronym} (id=${structureId}): ${err.message}. Using ellipsoid fallback.`);
              onFailed(targetMesh, acronym);
            });

        structures.forEach(s => {
          const targetMesh = meshMapRef.current[s.acronym];

            attribute float size;

            varying float vAlpha;

              vAlpha = alpha;
              vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);

      // ---------------------------------------------------------------------------
      // Axis indicator

      function drawAxisIndicator() {
        const canvas = axisCanvasRef.current;
        if (!canvas) return;
        const ctx    = canvas.getContext('2d');
        const SIZE   = 80;
        const CENTER = 40;
        const LENGTH = 28;

        ctx.clearRect(0, 0, SIZE, SIZE);
        ctx.beginPath();
        ctx.arc(CENTER, CENTER, 36, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(245, 242, 236, 0.85)';
        ctx.fill();
        ctx.strokeStyle = '#DDD8CE';
        ctx.lineWidth = 1;
        ctx.stroke();

        const { theta, phi } = orbitRef.current;
        const sinPhi = Math.sin(phi), cosPhi = Math.cos(phi);
        const sinTheta = Math.sin(theta), cosTheta = Math.cos(theta);

        const rightX =  sinPhi * cosTheta, rightY = 0, rightZ = -sinPhi * sinTheta;
        const rightLen = Math.sqrt(rightX*rightX + rightY*rightY + rightZ*rightZ) || 1;
        const upX = -(cosPhi * sinTheta), upY = sinPhi, upZ = -(cosPhi * cosTheta);
        const upLen = Math.sqrt(upX*upX + upY*upY + upZ*upZ) || 1;

        function projectAxis(ax, ay, az) {
          return {
            sx: (ax * rightX + ay * rightY + az * rightZ) / rightLen,
            sy: -((ax * upX + ay * upY + az * upZ) / upLen),
          };
        }

        const axes = [
          { vec: [1,0,0], color: '#E74C3C', label: 'R' },
          { vec: [0,1,0], color: '#2ECC71', label: 'D' },
          { vec: [0,0,1], color: '#3498DB', label: 'A' },
        ];

        const projected = axes.map(a => {
          const { sx, sy } = projectAxis(...a.vec);
          const viewX = sinPhi * sinTheta, viewY = cosPhi, viewZ = sinPhi * cosTheta;
          const depth = a.vec[0]*viewX + a.vec[1]*viewY + a.vec[2]*viewZ;
          return { ...a, sx, sy, depth };
        });
        projected.sort((a, b) => a.depth - b.depth);

        projected.forEach(({ sx, sy, color, label }) => {
          const ex = CENTER + sx * LENGTH;
          const ey = CENTER + sy * LENGTH;
          ctx.beginPath(); ctx.moveTo(CENTER, CENTER); ctx.lineTo(ex, ey);
          ctx.strokeStyle = color; ctx.lineWidth = 2.5; ctx.stroke();
          const angle = Math.atan2(sy, sx);
          ctx.beginPath();
          ctx.moveTo(ex, ey);
          ctx.lineTo(ex - 6*Math.cos(angle-0.4), ey - 6*Math.sin(angle-0.4));
          ctx.lineTo(ex - 6*Math.cos(angle+0.4), ey - 6*Math.sin(angle+0.4));
          ctx.closePath();
          ctx.fillStyle = color; ctx.fill();
          ctx.font = 'bold 9px "DM Mono", monospace';
          ctx.fillStyle = color;
          ctx.fillText(label, ex + 5*Math.cos(angle), ey + 5*Math.sin(angle) + 4);
        });
      }

          '350µm':350, '400µm':400, '1mm':1000, '2mm':2000, '4mm':4000, '6mm':6000,
        };
        const config = {
          tool: 'Allen Atlas Oblique Slice Planner',
          version: '2.1',
          mesh_source: backendStatus === 'ok'
            ? 'Allen CCF v3 PLY via local mesh server'
            : 'Allen CCF v3 PLY via static meshes directory, with ellipsoid fallback when files are missing',
          ccf_version: atlasVersion === 'p4' ? 'p4' : 'v3',
          slice_config: {
            top_angle_deg:  sliceResult.yaw,
            side_angle_deg: sliceResult.roll,
            dist_rostral_um: Math.round(sliceResult.apPosition + (atlasVersion === 'p4' ? 3700 : 6500)),
            dist_caudal_um:  Math.round((atlasVersion === 'p4' ? 3700 : 6500) - sliceResult.apPosition),
            thickness_um:   thicknessMap[sliceResult.thickness] ?? 400,
          },
          active_preset: highlightState.preset === 'tc'    ? 'thalamocortical'
                       : highlightState.preset === 'hippo' ? 'hippocampal'
                       : null,
          intersected_structures: sliceResult.intersections.map(ix => ({
            acronym: ix.acronym, name: ix.name, group: ix.group,
          })),
        };
        const blob = new Blob([JSON.stringify(config, null, 2)], { type: 'application/json' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.download = `slice_config_${Date.now()}.json`;
        a.href = url; a.click(); URL.revokeObjectURL(url);
      }, [sliceResult, sliceState, highlightState, backendStatus]);

      // ---------------------------------------------------------------------------
      // Hover tooltip
      // ---------------------------------------------------------------------------
      const handleMouseMove = useCallback((e) => {
        if (orbitRef.current?.isPointerDown) { setTooltip(null); return; }
        const now = Date.now();
        if (now - lastRaycastTime.current < 50) return;
        lastRaycastTime.current = now;
        const THREE = window.THREE;
        if (!THREE || !rendererRef.current || !cameraRef.current) return;
        const rect = e.currentTarget.getBoundingClientRect();
        const x = ( (e.clientX - rect.left)  / rect.width  ) * 2 - 1;
        const y = -((e.clientY - rect.top)   / rect.height ) * 2 + 1;
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(new THREE.Vector2(x, y), cameraRef.current);
        const hits = raycaster.intersectObjects(structureMeshesRef.current);
        if (hits.length > 0) {
          const ud = hits[0].object.userData;
          setTooltip({ x: e.clientX - rect.left + 12, y: e.clientY - rect.top - 20, name: ud.name, group: ud.group });
        } else {
          setTooltip(null);
        }
      }, []);

      // ---------------------------------------------------------------------------
      // SavedSlices handlers
      // ---------------------------------------------------------------------------
      const handleSaveSlice = useCallback(() => {
        if (!sliceResult) return;
        setShowSaveInput(true);
        setSaveNameInput('');
      }, [sliceResult]);

      const confirmSaveSlice = useCallback(() => {
        if (!sliceResult) return;
        const name = saveNameInput.trim() || `Slice ${savedSlices.length + 1}`;
        const sliceResultCopy = {
          ...sliceResult,
          intersections: sliceResult.intersections.map(ix => ({
            ...ix,
            centroid: ix.centroid.clone(),
            segments: ix.segments.map(s => ({ start: s.start.clone(), end: s.end.clone() })),
          })),
        };
        const thumbnail = renderMiniSlice({ sliceResult: sliceResultCopy });
        const entry = {
          id:         Date.now().toString(),
          name,
          pitch:      sliceResult.pitch      ?? sliceState.pitch,
          yaw:        sliceResult.yaw        ?? sliceState.yaw,
          roll:       sliceResult.roll       ?? sliceState.roll,
          apPosition: sliceResult.apPosition ?? sliceState.apPosition,
          lrPosition: sliceState.lrPosition,
          dvPosition: sliceState.dvPosition,
          thickness:  sliceResult.thickness,
          preset:     highlightState.preset,
          sliceResult: sliceResultCopy,
          thumbnail,
          savedAt: new Date().toISOString(),
        };
        setSavedSlices(prev => [...prev, entry]);
        setShowSaveInput(false);
        setSaveNameInput('');
      }, [sliceResult, sliceState, highlightState, savedSlices.length, saveNameInput]);

      const handleRecallSlice = useCallback((entry) => {
        setSliceState(s => ({
          ...s,
          pitch:      entry.pitch,
          yaw:        entry.yaw,
          roll:       entry.roll,
          apPosition: entry.apPosition,
          lrPosition: entry.lrPosition ?? 0,
          dvPosition: entry.dvPosition ?? 0,
        }));
        setSelectedThickness(entry.thickness);
        if (entry.preset) {
          applyPresetHighlight(entry.preset);
        } else {
          setHighlightState({ preset: null, highlighted: [] });
        }
        setSliceResult(entry.sliceResult);
        rightPanelRef.current?.scrollTo({ top: 0, behavior: 'smooth' });
      }, [applyPresetHighlight]);

      const handleDeleteSlice = useCallback((id) => {
        setSavedSlices(prev => prev.filter(e => e.id !== id));
      }, []);

      const handleExportSession = useCallback(() => {
        const data = {
          tool:       'Allen Atlas Oblique Slice Planner',
          version:    '1.0',
          exportedAt: new Date().toISOString(),
          slices: savedSlices.map(e => ({
            ...e,
            sliceResult: {
              ...e.sliceResult,
              plane: {
                normal:   { x: e.sliceResult.plane.normal.x, y: e.sliceResult.plane.normal.y, z: e.sliceResult.plane.normal.z },
                constant: e.sliceResult.plane.constant,
              },
            },
          })),
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.download = `atlas_session_${Date.now()}.json`;
        a.href = url; a.click(); URL.revokeObjectURL(url);
      }, [savedSlices]);

      const handleImportSession = useCallback((e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            if (!Array.isArray(data.slices)) throw new Error('Missing slices array');
            const THREE = window.THREE;
            const restored = data.slices.map(entry => {
              if (entry.sliceResult?.plane && !entry.sliceResult.plane.distanceToPoint) {
                const { normal: n, constant: c } = entry.sliceResult.plane;
                entry.sliceResult.plane = new THREE.Plane(new THREE.Vector3(n.x, n.y, n.z), c);
              }
              if (entry.sliceResult?.intersections) {
                entry.sliceResult.intersections.forEach(ix => {
                  if (ix.segments) {
                    ix.segments = ix.segments.map(seg => ({
                      start: seg.start?.x !== undefined ? new THREE.Vector3(seg.start.x, seg.start.y, seg.start.z) : seg.start,
                      end:   seg.end?.x   !== undefined ? new THREE.Vector3(seg.end.x,   seg.end.y,   seg.end.z)   : seg.end,
                    }));
                  }
                  if (ix.centroid?.x !== undefined) {
                    ix.centroid = new THREE.Vector3(ix.centroid.x, ix.centroid.y, ix.centroid.z);
                  }
                  if (!ix.color) ix.color = '#888888';
                });
              }
              return entry;
            });
            setSavedSlices(prev => [...prev, ...restored]);
            setImportMsg(`Imported ${restored.length} slice${restored.length !== 1 ? 's' : ''}`);
            setTimeout(() => setImportMsg(''), 2500);
          } catch (err) {
            setImportMsg(`Import failed: ${err.message}`);
            setTimeout(() => setImportMsg(''), 3000);
          }
          e.target.value = '';
        };
        reader.readAsText(file);
      }, []);

      // 2D Slice Interaction Handlers
      const handle2DPointerDown = useCallback((e) => {
        slice2DRef.current.isDown = true;
        slice2DRef.current.lastX = e.clientX;
        slice2DRef.current.lastY = e.clientY;
        e.currentTarget.setPointerCapture(e.pointerId);
      }, []);

      const handle2DPointerMove = useCallback((e) => {
        if (!slice2DRef.current.isDown) return;
        const dx = e.clientX - slice2DRef.current.lastX;
        const dy = e.clientY - slice2DRef.current.lastY;
        slice2DRef.current.lastX = e.clientX;
        slice2DRef.current.lastY = e.clientY;
        setSlice2DOrbit(prev => ({ ...prev, panX: prev.panX + dx, panY: prev.panY + dy }));
      }, []);

      const handle2DPointerUp = useCallback((e) => {
        slice2DRef.current.isDown = false;
        e.currentTarget.releasePointerCapture(e.pointerId);
      }, []);

      const handle2DWheel = useCallback((e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        setSlice2DOrbit(prev => ({ ...prev, zoom: Math.max(0.1, Math.min(10, prev.zoom * delta)) }));
      }, []);

      // ---------------------------------------------------------------------------
      // renderSlice2D — updated for interactivity
      // ---------------------------------------------------------------------------
      const renderSlice2D = useCallback(() => {
        const THREE = window.THREE;
        if (!THREE) return;
        const canvas = sliceCanvasRef.current;
        if (!canvas || !sliceResult) return;

        const W = canvas.offsetWidth || 400;
        const H = Math.max(320, Math.round(canvas.getBoundingClientRect().height || 340));
        canvas.width  = W;
        canvas.height = H;

        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#FAF8F5';
        ctx.fillRect(0, 0, W, H);

        ctx.strokeStyle = '#E8E4DC';
        ctx.lineWidth   = 0.5;
        for (let x = 0; x < W; x += 50) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
        for (let y = 0; y < H; y += 50) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

        const projection = getSliceProjection(sliceResult, visibilityState, slice2DOrbit, W, H);
        const visibleIntersections = projection?.intersections || [];

        canvas.userData = projection;

        if (!visibleIntersections.length) {
          ctx.font = '11px "DM Mono", monospace';
          ctx.fillStyle = '#8A8078';
          ctx.textAlign = 'center';
          ctx.fillText('No visible structures intersected', W / 2, H / 2);
          ctx.textAlign = 'left';
          return;
        }

        const { uAxis, vAxis, SCALE, cx, cy, vCenter } = projection;

        // Region fills
        visibleIntersections.forEach(intersection => {
          const pts = getIntersectionPolygonPoints(intersection, projection);
          if (pts.length < 3) return;
          ctx.beginPath();
          ctx.moveTo(pts[0].x, pts[0].y);
          pts.slice(1).forEach(p => ctx.lineTo(p.x, p.y));
          ctx.closePath();
          ctx.fillStyle = hexToRgba(intersection.color, 0.15);
          ctx.fill();
        });

        const expressionSamples = (expressionOverlaySupported && expressionOverlay.enabled)
          ? getExpressionSliceSamples(sliceResult, expressionOverlay, atlasVersion, pointInsideBrain)
          : [];
        const activeGeneMeta = expressionOverlay.activeGene ? EXPRESSION_OVERLAY_META[expressionOverlay.activeGene] : null;
        if (expressionOverlaySupported && expressionOverlay.enabled && activeGeneMeta && expressionSamples.length) {
          drawExpressionOverlay2D(ctx, expressionSamples, activeGeneMeta, visibleIntersections, projection);
        }

        // Stroke segments
        visibleIntersections.forEach(intersection => {
          ctx.strokeStyle = intersection.color;
          ctx.lineWidth = 2;
          ctx.lineCap = 'round';
          intersection.segments.forEach(seg => {
            ctx.beginPath();
            ctx.moveTo(seg.start.dot(uAxis) * SCALE + cx, (-seg.start.dot(vAxis)) * SCALE + cy);
            ctx.lineTo(seg.end.dot(uAxis)   * SCALE + cx, (-seg.end.dot(vAxis))   * SCALE + cy);
            ctx.stroke();
          });
        });

        // Labels
        ctx.font = 'bold 11px "DM Mono", monospace';
        const lb = visibleIntersections.map(ix => ({
          x: ix.centroid.dot(uAxis)*SCALE+cx,
          y: (-ix.centroid.dot(vAxis)) * SCALE + cy,
          origX: ix.centroid.dot(uAxis)*SCALE+cx,
          origY: (-ix.centroid.dot(vAxis)) * SCALE + cy,
          text: ix.acronym, color: ix.color,
        }));

        const LABEL_MIN_DIST = 22;
        for (let iter = 0; iter < 3; iter++) {
          for (let i = 0; i < lb.length; i++) {
            for (let j = i + 1; j < lb.length; j++) {
              const dx = lb[j].x - lb[i].x, dy = lb[j].y - lb[i].y;
              const dist = Math.sqrt(dx*dx + dy*dy);
              if (dist < LABEL_MIN_DIST && dist > 0) {
                const push = (LABEL_MIN_DIST - dist) / 2;
                lb[i].x -= (dx/dist)*push; lb[i].y -= (dy/dist)*push;
                lb[j].x += (dx/dist)*push; lb[j].y += (dy/dist)*push;
              }
            }
          }
        }

        lb.forEach(label => {
          const m = ctx.measureText(label.text);
          ctx.fillStyle = 'rgba(250,248,245,0.92)';
          ctx.beginPath();
          if (ctx.roundRect) ctx.roundRect(label.x-3, label.y-11, m.width+6, 15, 3);
          else ctx.rect(label.x-3, label.y-11, m.width+6, 15);
          ctx.fill();
          ctx.fillStyle = label.color;
          ctx.fillText(label.text, label.x, label.y);
        });

        // Scale bar
        const barPx = 1000 * SCALE;
        const barX = 12, barY = H - 14;
        ctx.save();
        ctx.strokeStyle = '#8A8078'; ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(barX, barY); ctx.lineTo(barX+barPx, barY);
        ctx.stroke();
        ctx.font = '9px "DM Mono", monospace'; ctx.fillStyle = '#8A8078';
        ctx.fillText('1 mm', barX+barPx/2-12, barY-4);

        if (expressionOverlaySupported && expressionOverlay.enabled && activeGeneMeta) {
          ctx.fillStyle = 'rgba(250,248,245,0.94)';
          ctx.strokeStyle = '#DDD8CE';
          ctx.lineWidth = 1;
          ctx.beginPath();
          if (ctx.roundRect) ctx.roundRect(W - 172, 12, 160, 40, 5);
          else ctx.rect(W - 172, 12, 160, 40);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = activeGeneMeta.color;
          ctx.font = 'bold 10px "DM Mono", monospace';
          ctx.fillText(activeGeneMeta.label, W - 160, 27);
          ctx.fillStyle = '#8A8078';
          ctx.font = '9px "DM Mono", monospace';
          ctx.fillText('gene-expression overlay', W - 160, 41);
        }
        ctx.restore();
      }, [sliceResult, slice2DOrbit, visibilityState, expressionOverlay, atlasVersion, expressionOverlaySupported, pointInsideBrain]);

      const handle2DClick = useCallback((e) => {
        if (!sliceResult || !sliceCanvasRef.current) return;
        const canvas = sliceCanvasRef.current;
        const rect = canvas.getBoundingClientRect();
        const ex = e.clientX - rect.left;
        const ey = e.clientY - rect.top;
        const ud = canvas.userData;
        if (!ud || !ud.baseScale) return;

        // Reverse projection to find which structure was clicked
        // Identifies structure with centroid closest to click in current screen space
        let closest = null, minDist = 25; // 25px radius
        ud.intersections.forEach(ix => {
          const u = ix.centroid.dot(ud.uAxis);
          const v = -ix.centroid.dot(ud.vAxis);
          const sx = u * ud.SCALE + ud.cx;
          const sy = v * ud.SCALE + ud.cy;
          const dist = Math.sqrt((sx - ex)**2 + (sy - ey)**2);
          if (dist < minDist) {
            minDist = dist;
            closest = ix;
          }
        });

        if (closest) {
          setSlice2DHover({ acronym: closest.acronym, name: closest.name, group: closest.group });
          // Highlight it in the 3D view too
          setHighlightState(prev => ({ ...prev, highlighted: [closest.acronym] }));
        } else {
          setSlice2DHover(null);
        }
      }, [sliceResult]);

      const handleChunk2DPointerDown = useCallback((e) => {
        chunk2DRef.current.isDown = true;
        chunk2DRef.current.lastX = e.clientX;
        chunk2DRef.current.lastY = e.clientY;
        e.currentTarget.setPointerCapture(e.pointerId);
      }, []);

      const handleChunk2DPointerMove = useCallback((e) => {
        if (!chunk2DRef.current.isDown) return;
        const dx = e.clientX - chunk2DRef.current.lastX;
        const dy = e.clientY - chunk2DRef.current.lastY;
        chunk2DRef.current.lastX = e.clientX;
        chunk2DRef.current.lastY = e.clientY;
        setChunk2DOrbit(prev => ({ ...prev, panX: prev.panX + dx, panY: prev.panY + dy }));
      }, []);

      const handleChunk2DPointerUp = useCallback((e) => {
        chunk2DRef.current.isDown = false;
        e.currentTarget.releasePointerCapture(e.pointerId);
      }, []);

      const handleChunk2DWheel = useCallback((e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        setChunk2DOrbit(prev => ({ ...prev, zoom: Math.max(0.1, Math.min(10, prev.zoom * delta)) }));
      }, []);

      const renderChunk2D = useCallback(() => {
        const THREE = window.THREE;
        if (!THREE) return;
        const canvas = chunkCanvasRef.current;
        if (!canvas || !activeChunkSlice) return;

        const W = canvas.offsetWidth || 400;
        const H = Math.max(340, Math.round(canvas.getBoundingClientRect().height || 340));
        canvas.width = W;
        canvas.height = H;

        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#FAF8F5';
        ctx.fillRect(0, 0, W, H);
        ctx.strokeStyle = '#E8E4DC';
        ctx.lineWidth = 0.5;
        for (let x = 0; x < W; x += 50) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
        for (let y = 0; y < H; y += 50) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

        const projection = getSliceProjection(activeChunkSlice, visibilityState, chunk2DOrbit, W, H);
        const visibleIntersections = projection?.intersections || [];
        canvas.userData = projection;

        if (!visibleIntersections.length) {
          ctx.font = '11px "DM Mono", monospace';
          ctx.fillStyle = '#8A8078';
          ctx.textAlign = 'center';
          ctx.fillText('No visible structures intersected', W / 2, H / 2);
          ctx.textAlign = 'left';
          return;
        }

        const { uAxis, vAxis, SCALE, cx, cy } = projection;
        visibleIntersections.forEach(intersection => {
          const pts = getIntersectionPolygonPoints(intersection, projection);
          if (pts.length < 3) return;
          ctx.beginPath();
          ctx.moveTo(pts[0].x, pts[0].y);
          pts.slice(1).forEach(point => ctx.lineTo(point.x, point.y));
          ctx.closePath();
          ctx.fillStyle = hexToRgba(intersection.color, 0.15);
          ctx.fill();
        });

        const expressionSamples = (expressionOverlaySupported && expressionOverlay.enabled)
          ? getExpressionSliceSamples(activeChunkSlice, expressionOverlay, atlasVersion, pointInsideBrain)
          : [];
        const activeGeneMeta = expressionOverlay.activeGene ? EXPRESSION_OVERLAY_META[expressionOverlay.activeGene] : null;
        if (expressionOverlaySupported && expressionOverlay.enabled && activeGeneMeta && expressionSamples.length) {
          drawExpressionOverlay2D(ctx, expressionSamples, activeGeneMeta, visibleIntersections, projection);
        }

        visibleIntersections.forEach(intersection => {
          ctx.strokeStyle = intersection.color;
          ctx.lineWidth = 2;
          ctx.lineCap = 'round';
          intersection.segments.forEach(seg => {
            ctx.beginPath();
            ctx.moveTo(seg.start.dot(uAxis) * SCALE + cx, (-seg.start.dot(vAxis)) * SCALE + cy);
            ctx.lineTo(seg.end.dot(uAxis) * SCALE + cx, (-seg.end.dot(vAxis)) * SCALE + cy);
            ctx.stroke();
          });
        });

        ctx.font = 'bold 11px "DM Mono", monospace';
        const labels = visibleIntersections.map(ix => ({
          x: ix.centroid.dot(uAxis) * SCALE + cx,
          y: (-ix.centroid.dot(vAxis)) * SCALE + cy,
          text: ix.acronym,
          color: ix.color,
        }));

        const LABEL_MIN_DIST = 20;
        for (let iter = 0; iter < 3; iter++) {
          for (let i = 0; i < labels.length; i++) {
            for (let j = i + 1; j < labels.length; j++) {
              const dx = labels[j].x - labels[i].x;
              const dy = labels[j].y - labels[i].y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              if (dist < LABEL_MIN_DIST && dist > 0) {
                const push = (LABEL_MIN_DIST - dist) / 2;
                labels[i].x -= (dx / dist) * push;
                labels[i].y -= (dy / dist) * push;
                labels[j].x += (dx / dist) * push;
                labels[j].y += (dy / dist) * push;
              }
            }
          }
        }

        labels.forEach(label => {
          const metrics = ctx.measureText(label.text);
          ctx.fillStyle = 'rgba(250,248,245,0.92)';
          ctx.beginPath();
          if (ctx.roundRect) ctx.roundRect(label.x - 3, label.y - 11, metrics.width + 6, 15, 3);
          else ctx.rect(label.x - 3, label.y - 11, metrics.width + 6, 15);
          ctx.fill();
          ctx.fillStyle = label.color;
          ctx.fillText(label.text, label.x, label.y);
        });

        const barPx = 1000 * SCALE;
        const barX = 12;
        const barY = H - 14;
        ctx.save();
        ctx.strokeStyle = '#8A8078';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(barX, barY);
        ctx.lineTo(barX + barPx, barY);
        ctx.stroke();
        ctx.font = '9px "DM Mono", monospace';
        ctx.fillStyle = '#8A8078';
        ctx.fillText('1 mm', barX + barPx / 2 - 12, barY - 4);

        if (expressionOverlaySupported && expressionOverlay.enabled && activeGeneMeta) {
          ctx.fillStyle = 'rgba(250,248,245,0.94)';
          ctx.strokeStyle = '#DDD8CE';
          ctx.lineWidth = 1;
          ctx.beginPath();
          if (ctx.roundRect) ctx.roundRect(W - 172, 12, 160, 40, 5);
          else ctx.rect(W - 172, 12, 160, 40);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = activeGeneMeta.color;
          ctx.font = 'bold 10px "DM Mono", monospace';
          ctx.fillText(activeGeneMeta.label, W - 160, 27);
          ctx.fillStyle = '#8A8078';
          ctx.font = '9px "DM Mono", monospace';
          ctx.fillText('gene-expression overlay', W - 160, 41);
        }
        ctx.restore();
      }, [activeChunkSlice, chunk2DOrbit, visibilityState, expressionOverlay, atlasVersion, expressionOverlaySupported, pointInsideBrain]);

      const handleChunk2DClick = useCallback((e) => {
        if (!activeChunkSlice || !chunkCanvasRef.current) return;
        const canvas = chunkCanvasRef.current;
        const rect = canvas.getBoundingClientRect();
        const ex = e.clientX - rect.left;
        const ey = e.clientY - rect.top;
        const ud = canvas.userData;
        if (!ud?.intersections?.length) return;

        let closest = null;
        let minDist = 25;
        ud.intersections.forEach(ix => {
          const u = ix.centroid.dot(ud.uAxis);
          const v = -ix.centroid.dot(ud.vAxis);
          const sx = u * ud.SCALE + ud.cx;
          const sy = v * ud.SCALE + ud.cy;
          const dist = Math.sqrt((sx - ex) ** 2 + (sy - ey) ** 2);
          if (dist < minDist) {
            minDist = dist;
            closest = ix;
          }
        });

        if (closest) {
          setChunk2DHover({ acronym: closest.acronym, name: closest.name, group: closest.group });
          setHighlightState(prev => ({ ...prev, highlighted: [closest.acronym] }));
        } else {
          setChunk2DHover(null);
        }
      }, [activeChunkSlice]);

      useEffect(() => {
        if (sliceResult) renderSlice2D();
      }, [sliceResult, renderSlice2D]);

      useEffect(() => {
        if (activeChunkSlice) renderChunk2D();
      }, [activeChunkSlice, renderChunk2D]);

      // ---------------------------------------------------------------------------
      // Render
      // ---------------------------------------------------------------------------
      return (
        <>
          {/* Root container — full viewport */}
          <div style={{
            display: 'flex', width: '100%', height: '100dvh', minHeight: '100dvh',
            overflow: 'hidden', background: T.bg, fontFamily: T.fontMono,
          }}>

            {/* ================================================================
                LEFT PANEL — CSS grid "specimen frame" layout
            ================================================================ */}
            <div style={{
              flex: `0 0 ${leftWidth}%`,
              display: 'grid',
              gridTemplateAreas: '". top ." "left canvas right" ". bottom ."',
